<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checker Shadow Illusion Demo</title>

<style>
body {
    margin: 0;
    background: #ffffff;
    color: #111;
    overflow: hidden;
    font-family: Arial, Helvetica, sans-serif;
}

canvas {
    display: block;
    width: 100vw;
    height: 100vh;
    cursor: grab;
    touch-action: none;
}

canvas.dragging {
    cursor: grabbing;
}

#instructions {
    position: absolute;
    left: 24px;
    top: 20px;
    max-width: 760px;
    padding: 14px 18px;
    background: rgba(255,255,255,0.88);
    border: 1px solid rgba(0,0,0,0.10);
    border-radius: 14px;
    pointer-events: none;
    box-shadow: 0 5px 18px rgba(0,0,0,0.08);
}

#instructions h1 {
    margin: 0 0 8px 0;
    font-size: 28px;
}

#instructions p {
    margin: 5px 0;
    font-size: 17px;
    line-height: 1.35;
}

#controls {
    position: absolute;
    left: 24px;
    bottom: 24px;
    width: 360px;
    padding: 16px 18px;
    background: rgba(255,255,255,0.88);
    border: 1px solid rgba(0,0,0,0.10);
    border-radius: 14px;
    box-shadow: 0 5px 18px rgba(0,0,0,0.08);
    user-select: none;
}

#controls label {
    display: block;
    font-size: 16px;
    margin-bottom: 10px;
}

.row {
    display: flex;
    align-items: center;
    gap: 12px;
}

input[type="range"] {
    flex: 1;
}

#grayValue {
    width: 52px;
    text-align: right;
    font-variant-numeric: tabular-nums;
}

button {
    margin-top: 14px;
    padding: 10px 14px;
    border: 1px solid rgba(0,0,0,0.14);
    border-radius: 10px;
    background: rgba(0,0,0,0.05);
    color: #111;
    font-size: 15px;
    cursor: pointer;
}

button:hover {
    background: rgba(0,0,0,0.09);
}

.note {
    margin-top: 10px;
    font-size: 13px;
    color: #444;
    line-height: 1.35;
}
</style>
</head>

<body>

<div id="instructions">
    <h1>Checker Shadow Illusion</h1>
    <p>Drag the gray checker-shaped patch over squares <b>A</b> and <b>B</b>.</p>
    <p>The patch matches both by default. Use the slider to test the match yourself.</p>
</div>

<div id="controls">
    <label for="brightnessSlider">Patch brightness</label>

    <div class="row">
        <input id="brightnessSlider" type="range"
               min="0" max="255" step="1" value="120">
        <span id="grayValue">120</span>
    </div>

    <button id="resetButton">Reset patch to match</button>

</div>

<canvas id="canvas"></canvas>

// Matching gray value for A and B.
  const matchingGray = 111;  // 111

// -----------------------------------------------------
// PATCH CORNERS
// -----------------------------------------------------
//
// Coordinates for the four corners of the movable patch.
//
// These are specified relative to the patch center,
// in ORIGINAL IMAGE PIXELS.
//
// The order is:
//
//   0 = upper-left
//   1 = upper-right
//   2 = lower-right
//   3 = lower-left
//
// Adjust these values to fine-tune the shape so that
// it perfectly matches the geometry of the checkerboard.
//
// -----------------------------------------------------

const xShift = -900;
const yShift = -200;

const basePatchCorners = [

 //   { x: -112, y: -56 },   // upper-left
//    { x:   74, y: -14 },   // upper-right
//    { x:  112, y:  58 },   // lower-right
//    { x:  -74, y:  16 }    // lower-left
    
        { x: -34, y: -164 },   // upper-left
    { x:   213, y: -107 },   // upper-right
    { x:  73, y:  38 },   // lower-right
    { x:  -180, y:  -18 }    // lower-left



];

const patchCorners = basePatchCorners.map(p => ({
    x: p.x + xShift,
    y: p.y + yShift
}));


// -----------------------------------------------------

// Starting location of the patch center.
const startPatch = { x: 650, y: 640 };

// =====================================================

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const slider = document.getElementById("brightnessSlider");
const grayValue = document.getElementById("grayValue");
const resetButton = document.getElementById("resetButton");

const img = new Image();
img.src = imageSource;

let view = {
    scale: 1,
    offsetX: 0,
    offsetY: 0
};

let patch = { ...startPatch };
let patchGray = matchingGray;

let dragging = false;

let dragOffset = {
    x: 0,
    y: 0
};

slider.value = matchingGray;
grayValue.textContent = matchingGray;

// =====================================================
// COORDINATE CONVERSIONS
// =====================================================

function imageToCanvas(p) {

    return {
        x: view.offsetX + p.x * view.scale,
        y: view.offsetY + p.y * view.scale
    };
}

function canvasToImage(p) {

    return {
        x: (p.x - view.offsetX) / view.scale,
        y: (p.y - view.offsetY) / view.scale
    };
}

function pointerPosition(e) {

    const rect = canvas.getBoundingClientRect();

    return {
        x: e.clientX - rect.left,
        y: e.clientY - rect.top
    };
}

// =====================================================
// RESIZE
// =====================================================

function resizeCanvas() {

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const sx = canvas.width / img.width;
    const sy = canvas.height / img.height;

    view.scale = Math.min(sx, sy) * 0.94;

    view.offsetX =
        (canvas.width - img.width * view.scale) / 2;

    view.offsetY =
        (canvas.height - img.height * view.scale) / 2;

    draw();
}

// =====================================================
// DRAW
// =====================================================

function draw() {

    if (!img.complete) return;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "white";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.drawImage(
        img,
        view.offsetX,
        view.offsetY,
        img.width * view.scale,
        img.height * view.scale
    );

    drawPatch();
}

function drawPatch() {

    const gray = Math.round(patchGray);

    const points = patchCorners.map(p => imageToCanvas({
        x: patch.x + p.x,
        y: patch.y + p.y
    }));

    ctx.beginPath();

    ctx.moveTo(points[0].x, points[0].y);

    for (let i = 1; i < points.length; i++) {
        ctx.lineTo(points[i].x, points[i].y);
    }

    ctx.closePath();

    // No shadow.
    // No border.
    // Pure uniform fill.

    ctx.fillStyle =
        `rgb(${gray}, ${gray}, ${gray})`;

    ctx.fill();
}

// =====================================================
// HIT TESTING
// =====================================================

function pointInPatch(canvasPoint) {

    const imagePoint = canvasToImage(canvasPoint);

    const points = patchCorners.map(p => ({
        x: patch.x + p.x,
        y: patch.y + p.y
    }));

    let inside = false;

    for (let i = 0, j = points.length - 1;
         i < points.length;
         j = i++) {

        const xi = points[i].x;
        const yi = points[i].y;

        const xj = points[j].x;
        const yj = points[j].y;

        const intersect =
            ((yi > imagePoint.y) !==
             (yj > imagePoint.y)) &&

            (imagePoint.x <
             (xj - xi) *
             (imagePoint.y - yi) /
             (yj - yi) + xi);

        if (intersect) inside = !inside;
    }

    return inside;
}

// =====================================================
// POINTER INTERACTION
// =====================================================

canvas.addEventListener("pointerdown", e => {

    const pCanvas = pointerPosition(e);
    const pImage = canvasToImage(pCanvas);

    if (pointInPatch(pCanvas)) {

        dragging = true;

        canvas.classList.add("dragging");

        dragOffset.x = pImage.x - patch.x;
        dragOffset.y = pImage.y - patch.y;

        canvas.setPointerCapture(e.pointerId);
    }
});

canvas.addEventListener("pointermove", e => {

    if (!dragging) return;

    const pImage =
        canvasToImage(pointerPosition(e));

    patch.x = pImage.x - dragOffset.x;
    patch.y = pImage.y - dragOffset.y;

    draw();
});

canvas.addEventListener("pointerup", e => {

    dragging = false;

    canvas.classList.remove("dragging");

    try {
        canvas.releasePointerCapture(e.pointerId);
    } catch {}
});

canvas.addEventListener("pointercancel", () => {

    dragging = false;

    canvas.classList.remove("dragging");
});

// =====================================================
// UI
// =====================================================

slider.addEventListener("input", () => {

    patchGray = Number(slider.value);

    grayValue.textContent = patchGray;

    draw();
});

resetButton.addEventListener("click", () => {

    patchGray = matchingGray;

    slider.value = matchingGray;

    grayValue.textContent = matchingGray;

    patch = { ...startPatch };

    draw();
});

// =====================================================

window.addEventListener("resize", resizeCanvas);

img.onload = resizeCanvas;

</script>
